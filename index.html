<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>Reversi</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="player player-white" id="player-white">
    <div class="player-piece-wrap">
      <div class="piece-mini" data-mini-color="white"></div>
    </div>
    <div class="tray" id="hand-white" aria-label="white pieces in hand"></div>
  </div>

  <div class="board-wrapper">
    <div class="board" id="board"></div>
  </div>

  <div class="player player-black" id="player-black">
    <div class="player-piece-wrap">
      <div class="piece-mini" data-mini-color="black"></div>
    </div>
    <div class="tray" id="hand-black" aria-label="black pieces in hand"></div>
  </div>
</div>
<div class="overlay" id="overlay" role="status" aria-live="polite" aria-hidden="true"></div>
<script src="flip-order.js"></script>
<script src="script.js"></script>
</body>
</html>
